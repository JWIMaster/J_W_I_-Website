<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>J_W_I_</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg1:#0b0b10;
      --bg2:#12122a;
      --card:#161625;
      --text:#ffffff;
      --muted:rgba(255,255,255,0.7);
      --border:rgba(255,255,255,0.08);
      --radius:16px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:'Outfit',sans-serif;
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      background: radial-gradient(circle at top, var(--bg2), var(--bg1) 60%);
    }

    .container{
      width:min(760px,92vw);
      padding:44px 28px;
    }

    h1{
      margin:0 0 6px;
      font-size:3rem;
      font-weight:700;
      letter-spacing:1px;
    }

    .subtitle{
      color:var(--muted);
      margin-bottom:28px;
    }

    section{
      margin-top:26px;
    }

    h2{
      font-size:1.1rem;
      font-weight:600;
      margin:18px 0 14px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:1px;
    }

    .row{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
    }

    a.button{
      display:inline-block;
      padding:12px 20px;
      border-radius:12px;
      text-decoration:none;
      color:var(--text);
      font-weight:600;
      font-size:0.95rem;
      background:var(--card);
      border:1px solid var(--border);
      transition:transform 160ms ease, background 160ms ease, border 160ms ease;
    }

    a.button:hover{
      transform:translateY(-3px);
      background:#1c1c33;
      border-color:rgba(255,255,255,0.16);
    }

    footer{
      margin-top:36px;
      color:var(--muted);
      font-size:0.85rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>J_W_I_</h1>
    <div class="subtitle">Projects, experiments, and photography</div>

    <section>
      <h2>Main</h2>
      <div class="row">
        <a class="button" href="/support.html">Support</a>
        <a class="button" href="/photography.html">Photography</a>
      </div>
    </section>

    <section>
      <h2>Swift on iOS 6</h2>
      <div class="row">
        <a class="button" href="/swiftios6.html">Writeup</a>
        <a class="button" href="/swiftonios6guidepart1.html">Setup Guide</a>
      </div>
    </section>

    <section>
      <h2>Colour Snap</h2>
      <div class="row">
        <a class="button" href="https://discord.gg/uKdgNmTAnP">Discord</a>
        <a class="button" href="https://testflight.apple.com/join/xKY2rMdC">TestFlight</a>
        <a class="button" href="https://apps.apple.com/us/app/colour-snap/id6747701369">App Store</a>
        <a class="button" href="https://ko-fi.com/jwi">Donate</a>
      </div>
    </section>

    <section>
      <h2>Photography</h2>
      <div class="row">
        <a class="button" href="https://jwi.pixieset.com/" target="_blank">View Portfolio</a>
      </div>
    </section>

    <footer>
      © J_W_I_
    </footer>
  </div>
</body>
</html>
